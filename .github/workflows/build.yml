name: Build Alelaskuri APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      DEBIAN_FRONTEND: noninteractive
      CI: "true"
      PIP_NO_INPUT: "1"

    steps:
      # 1. Hae repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python 3.10 (vakaa Kivy/Buildozerille)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Java 17 (TÄRKEIN FIX sinun viimeiseen erroriin)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 4. System dependencies
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            python3-pip \
            build-essential \
            autoconf libtool pkg-config \
            wget

      # 5. Python tools
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # 6. Varmista puhdas build-tila
      - name: Clean build folder
        run: |
          rm -rf .buildozer
          buildozer init || true

      # 7. Build APK
      - name: Build APK
        run: |
          buildozer android debug -v

      # 8. Upload APK
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: alelaskuri-apk
          path: bin/*.apk
