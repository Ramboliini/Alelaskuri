name: Build Alelaskuri APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/buildozer:latest

    env:
      DEBIAN_FRONTEND: noninteractive
      CI: "1"
      BUILDOZER_WARN_ON_ROOT: "0"
      PIP_NO_INPUT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force clean build folder
        run: |
          rm -rf .buildozer

      - name: Build APK
        run: |
          buildozer android debug -v

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alelaskuri-apk
          path: bin/*.apk
